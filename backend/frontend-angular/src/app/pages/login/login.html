<div class="bg-primary" style="height: 100vh; display: flex; align-items: center; justify-content: center;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5">
                <div class="card shadow-lg border-0 rounded-lg mt-5">
                    <div class="card-header"><h3 class="text-center font-weight-light my-4">CRM Login</h3></div>
                    <div class="card-body">
                        <form (ngSubmit)="onLogin()">
                            <div class="form-floating mb-3">
                                <input class="form-control" id="inputEmail" type="email" placeholder="name@example.com" [(ngModel)]="loginData.email" name="email" required />
                                <label for="inputEmail">Email address</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input class="form-control" id="inputPassword" type="password" placeholder="Password" [(ngModel)]="loginData.password" name="password" required />
                                <label for="inputPassword">Password</label>
                            </div>
                            <div class="d-flex align-items-center justify-content-between mt-4 mb-0">
                                <a class="small text-primary" style="cursor: pointer;" (click)="showForgotPasswordAlert($event)">
                                    Forgot Password?
                                </a>
                                <button class="btn btn-primary" type="submit" [disabled]="isLoading">
                                    {{ isLoading ? 'Loading...' : 'Login' }}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
